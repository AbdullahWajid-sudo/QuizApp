specVersion: "v1beta"
serviceId: "quizapp"
location: "us-east4"
schema:
  - source: "./schema"
    datasource:
      postgresql:
        database: "fdcdb"
        cloudSql:
          instanceId: "quizapp-fdc"
          # schemaValidation: "STRICT"     # STRICT mode makes Postgres schema match Data Connect exactly.
          # schemaValidation: "COMPATIBLE" # COMPATIBLE mode makes Postgres schema compatible with Data Connect.
connectorDirs: ["./example"]

package:
  registry: "us-east4-docker.pkg.dev"
  projectId: "quizapp-fdc"
  image: "quizapp-fdc"
  tag: "latest"
  schema: "schema"
  serviceConfig:
    service: "quizapp-fdc"
    region: "us-east4"
    projectNumber: "463888847824"
    connectorPort: 5432
    # connectorPort: 3306
    # connectorPort: 9092
